<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | BlogSpace</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow);
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="logo">BlogSpace</a>
        <nav id="nav-links">
            <!-- Navigation will be loaded via JS for consistency -->
            <a href="/">Home</a>
            <a href="#" id="logout-btn">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <div class="profile-header">
                <img id="display-avatar" src="https://ui-avatars.com/api/?name=User&background=random"
                    class="profile-avatar">
                <div>
                    <h2 id="display-name">Loading...</h2>
                    <p id="display-email" style="color: var(--text-secondary);"></p>
                </div>
            </div>

            <form id="profile-form">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>
                <div class="form-group">
                    <label>Profile Picture URL</label>
                    <input type="url" id="profilePicture" name="profilePicture"
                        placeholder="https://example.com/avatar.jpg">
                </div>
                <div class="form-group">
                    <label>New Password (leave blank to keep current)</label>
                    <input type="password" id="password" name="password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
            </form>
        </div>

        <div id="posts-section" class="card" style="margin-top: 2rem; display: none;">
            <h3>My Posts</h3>
            <div id="author-posts" class="post-grid" style="margin-top: 1.5rem;">
                <!-- Posts will be loaded here -->
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            const currentUser = auth.getUser();
            const isAdmin = auth.hasRole('ROLE_ADMIN');
            const isAuthor = auth.hasRole('ROLE_AUTHOR');

            // Update navigation
            const nav = document.getElementById('nav-links');
            let dashboardLink = '';
            if (isAdmin) {
                dashboardLink = '<a href="/admin-dashboard.html">Admin Panel</a>';
            } else if (isAuthor) {
                dashboardLink = '<a href="/author-dashboard.html">My Dashboard</a>';
            }

            let newPostLink = '';
            if (isAdmin || isAuthor) {
                newPostLink = '<a href="/create-post.html">New Post</a>';
            }

            nav.innerHTML = `
                <a href="/">Home</a>
                ${dashboardLink}
                ${newPostLink}
                <a href="/chat.html">Chat</a>
                <a href="#" id="logout-btn">Logout</a>
            `;

            document.getElementById('logout-btn').addEventListener('click', () => {
                auth.logout();
                window.location.href = '/';
            });

            try {
                // Fetch full user data including bio
                const userData = await apiRequest(`/users/${currentUser.id}`);

                document.getElementById('display-name').textContent = `${userData.firstName} ${userData.lastName}`;
                document.getElementById('display-email').textContent = userData.email;
                if (userData.profilePicture) {
                    document.getElementById('display-avatar').src = userData.profilePicture;
                }

                document.getElementById('firstName').value = userData.firstName || '';
                document.getElementById('lastName').value = userData.lastName || '';
                document.getElementById('bio').value = userData.bio || '';
                document.getElementById('profilePicture').value = userData.profilePicture || '';

                if (auth.hasRole('ROLE_AUTHOR') || auth.hasRole('ROLE_ADMIN')) {
                    document.getElementById('posts-section').style.display = 'block';
                    loadAuthorPosts(userData.id);
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }

            async function loadAuthorPosts(userId) {
                try {
                    const response = await apiRequest(`/posts/author/${userId}`);
                    const posts = response.content;
                    const container = document.getElementById('author-posts');
                    if (posts && posts.length) {
                        container.innerHTML = posts.map(post => `
                            <div class="post-card" style="font-size: 0.9rem;">
                                <img src="${post.featuredImage || 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800'}" style="height: 120px;">
                                <div class="post-card-content" style="padding: 1rem;">
                                    <h4 style="margin: 0;">${post.title}</h4>
                                    <div style="margin-top: 0.5rem;">
                                        <a href="/post.html?id=${post.id}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.7rem; background: #f1f5f9;">View</a>
                                        <a href="/edit-post.html?id=${post.id}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.7rem; background: #f1f5f9;">Edit</a>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<p style="color: var(--text-secondary);">You haven\'t published any posts yet.</p>';
                    }
                } catch (err) {
                    console.error('Failed to load posts:', err);
                }
            }

            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());

                try {
                    const updatedUser = await apiRequest(`/users/${currentUser.id}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });

                    auth.setUser(updatedUser);
                    showNotification('Profile updated successfully!');
                    setTimeout(() => window.location.reload(), 1500);
                } catch (err) {
                    showNotification(err.message, 'error');
                }
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                auth.logout();
                window.location.href = '/';
            });
        });
    </script>
</body>

</html>
