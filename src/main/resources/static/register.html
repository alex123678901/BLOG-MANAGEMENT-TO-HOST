<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | BlogSpace</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .form-group {
            margin-bottom: 1rem !important;
        }

        label {
            margin-bottom: 0.25rem !important;
        }
    </style>
</head>

<body
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #e2e8f0; padding: 2rem 1rem; overflow-y: auto;">
    <div class="card" style="width: 100%; max-width: 500px; padding: 2rem; margin: auto;">
        <h2 style="margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem;">Create an Account</h2>
        <form id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName">
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" id="profilePicture" accept="image/*">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio"
                    style="width: 100%; min-height: 80px; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; margin-top: 0.5rem; font-family: inherit;"></textarea>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Join As</label>
                <select id="role" class="form-input"
                    style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; margin-top: 0.5rem;">
                    <option value="ROLE_AUTHOR">Author (Write & Read Posts)</option>
                    <option value="ROLE_READER">Reader (Read Only)</option>
                    <option value="ROLE_ADMIN">Administrator</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>
        <p style="margin-top: 2rem; text-align: center; color: var(--text-secondary); font-size: 0.875rem;">
            Already have an account? <a href="/login.html" style="color: var(--primary-color);">Login</a>
        </p>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('profilePicture');
            let profilePictureUrl = '';

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                try {
                    const uploadRes = await fetch('/api/files/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadRes.ok) {
                        profilePictureUrl = uploadData.url;
                    } else {
                        throw new Error(uploadData.error || 'File upload failed');
                    }
                } catch (err) {
                    alert('Upload Error: ' + err.message);
                    return;
                }
            }

            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                bio: document.getElementById('bio').value,
                profilePicture: profilePictureUrl,
                roles: [document.getElementById('role').value]
            };

            try {
                await apiRequest('/users/register', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                alert('Registration successful! Please login.');
                window.location.href = '/login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
