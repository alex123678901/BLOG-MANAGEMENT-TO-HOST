<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | BlogSpace</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>
    <header>
        <a href="/" class="logo">BlogSpace</a>
        <nav id="nav-links">
            <a href="/">Home</a>
            <a href="/admin-dashboard.html">Dashboard</a>
            <a href="/profile.html">Profile</a>
            <a href="#" id="logout-btn">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2 style="margin-bottom: 2rem;">Create New Blog Post</h2>
            <form id="post-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Enter a catchy title" required>
                </div>
                <div class="form-group">
                    <label>Summary</label>
                    <input type="text" id="summary" placeholder="Brief summary of the post">
                </div>
                <div class="form-group">
                    <label>Featured Image URL</label>
                    <input type="text" id="featuredImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <div id="editor" style="height: 300px; margin-bottom: 1rem;"></div>
                </div>
                <div class="form-group">
                    <label>Categories (Select one or more)</label>
                    <select id="category-select" multiple style="height: 100px;">
                        <!-- Categories will be loaded here -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Post</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Write your story here...'
        });

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            // Load Categories
            try {
                const categories = await apiRequest('/categories');
                const select = document.getElementById('category-select');
                select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            } catch (err) {
                console.error('Failed to load categories');
            }
        });

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectedCategories = Array.from(document.getElementById('category-select').selectedOptions).map(o => o.value);

            const data = {
                title: document.getElementById('title').value,
                summary: document.getElementById('summary').value,
                featuredImage: document.getElementById('featuredImage').value,
                content: quill.root.innerHTML,
                status: document.getElementById('status').value,
                categoryIds: selectedCategories
            };

            try {
                await apiRequest(`/posts?authorId=${auth.getUser().id}`, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                showNotification('Post created successfully!');
                setTimeout(() => window.location.href = '/index.html', 1500);
            } catch (err) {
                showNotification('Error creating post: ' + err.message, 'error');
            }
        });

        document.getElementById('logout-btn').onclick = () => { auth.logout(); window.location.href = '/login.html'; };
    </script>
</body>

</html>
