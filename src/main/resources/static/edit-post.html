<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post | BlogSpace</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>
    <header>
        <a href="/" class="logo">BlogSpace</a>
        <nav id="nav-links">
            <a href="/">Home</a>
            <a href="/admin-dashboard.html">Dashboard</a>
            <a href="/profile.html">Profile</a>
            <a href="#" id="logout-btn">Logout</a>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2 style="margin-bottom: 2rem;">Edit Blog Post</h2>
            <form id="post-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Summary</label>
                    <input type="text" id="summary">
                </div>
                <div class="form-group">
                    <label>Featured Image URL</label>
                    <input type="text" id="featuredImage">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <div id="editor" style="height: 300px; margin-bottom: 1rem;"></div>
                </div>
                <div class="form-group">
                    <label>Categories</label>
                    <select id="category-select" multiple style="height: 100px;">
                        <!-- Categories will be loaded here -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Post</button>
                <button type="button" id="delete-btn" class="btn"
                    style="width: 100%; margin-top: 1rem; background: var(--error-color); color: white;">Delete
                    Post</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const quill = new Quill('#editor', { theme: 'snow' });
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!auth.isAuthenticated()) { window.location.href = '/login.html'; return; }
            if (!postId) { window.location.href = '/'; return; }

            try {
                // Load Categories first
                const categories = await apiRequest('/categories');
                const select = document.getElementById('category-select');
                select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

                // Load Post Data
                const post = await apiRequest(`/posts/${postId}`);
                document.getElementById('title').value = post.title;
                document.getElementById('summary').value = post.summary || '';
                document.getElementById('featuredImage').value = post.featuredImage || '';
                quill.root.innerHTML = post.content;
                document.getElementById('status').value = post.status;

                // Select existing categories
                const categoryNames = post.categories;
                Array.from(select.options).forEach(opt => {
                    if (categoryNames.includes(opt.textContent)) opt.selected = true;
                });
            } catch (err) {
                showNotification(err.message, 'error');
            }
        });

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectedCategories = Array.from(document.getElementById('category-select').selectedOptions).map(o => o.value);
            const data = {
                title: document.getElementById('title').value,
                summary: document.getElementById('summary').value,
                featuredImage: document.getElementById('featuredImage').value,
                content: quill.root.innerHTML,
                status: document.getElementById('status').value,
                categoryIds: selectedCategories
            };

            try {
                await apiRequest(`/posts/${postId}`, { method: 'PUT', body: JSON.stringify(data) });
                showNotification('Post updated successfully!');
                setTimeout(() => window.location.href = `/post.html?id=${postId}`, 1500);
            } catch (err) {
                showNotification(err.message, 'error');
            }
        });

        document.getElementById('delete-btn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to delete this post?')) {
                try {
                    await apiRequest(`/posts/${postId}`, { method: 'DELETE' });
                    showNotification('Post deleted successfully');
                    window.location.href = '/index.html';
                } catch (err) {
                    showNotification(err.message, 'error');
                }
            }
        });

        document.getElementById('logout-btn').onclick = () => { auth.logout(); window.location.href = '/login.html'; };
    </script>
</body>

</html>
